<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Pollito Ansioso - Bajo tus Alas -->
  <!-- Sombra -->
  <ellipse cx="60" cy="108" rx="30" ry="6" fill="#E0C88A" opacity="0.3"/>
  <!-- Cuerpo (ligeramente tembloroso) -->
  <ellipse cx="61" cy="72" rx="32" ry="30" fill="#FFD54F"/>
  <!-- Ala izquierda (levantada nerviosa) -->
  <ellipse cx="26" cy="62" rx="13" ry="19" fill="#FFCA28" transform="rotate(-25 26 62)"/>
  <ellipse cx="26" cy="62" rx="9" ry="15" fill="#FFD54F" transform="rotate(-25 26 62)"/>
  <!-- Ala derecha (levantada nerviosa) -->
  <ellipse cx="94" cy="62" rx="13" ry="19" fill="#FFCA28" transform="rotate(25 94 62)"/>
  <ellipse cx="94" cy="62" rx="9" ry="15" fill="#FFD54F" transform="rotate(25 94 62)"/>
  <!-- Cabeza -->
  <circle cx="60" cy="42" r="24" fill="#FFD54F"/>
  <!-- Mejillas nerviosas -->
  <circle cx="42" cy="48" r="5" fill="#FFAB91" opacity="0.6"/>
  <circle cx="78" cy="48" r="5" fill="#FFAB91" opacity="0.6"/>
  <!-- Ojos grandes asustados -->
  <circle cx="52" cy="38" r="6" fill="white"/>
  <circle cx="52" cy="39" r="3.5" fill="#5D4037"/>
  <circle cx="53" cy="38" r="1.2" fill="white"/>
  <circle cx="68" cy="38" r="6" fill="white"/>
  <circle cx="68" cy="39" r="3.5" fill="#5D4037"/>
  <circle cx="69" cy="38" r="1.2" fill="white"/>
  <!-- Cejas preocupadas -->
  <path d="M46 30 Q50 28 56 32" stroke="#5D4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M64 32 Q70 28 74 30" stroke="#5D4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Pico mordido/nervioso -->
  <path d="M56 50 Q60 52 64 50 Q60 55 56 50Z" fill="#FF8F00"/>
  <!-- Gotitas de sudor -->
  <path d="M80 28 Q82 33 80 36" stroke="#64B5F6" stroke-width="1.5" fill="#90CAF9" opacity="0.6"/>
  <path d="M84 34 Q85 37 84 39" stroke="#64B5F6" stroke-width="1" fill="#90CAF9" opacity="0.4"/>
  <!-- Líneas de temblor -->
  <path d="M20 55 L16 55" stroke="#FFCA28" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M100 55 L104 55" stroke="#FFCA28" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Patitas -->
  <path d="M48 98 L44 108 M48 98 L48 108 M48 98 L52 108" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72 98 L68 108 M72 98 L72 108 M72 98 L76 108" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Copete erizado -->
  <ellipse cx="56" cy="21" rx="3" ry="7" fill="#FFCA28" transform="rotate(-20 56 21)"/>
  <ellipse cx="60" cy="19" rx="3" ry="7" fill="#FFCA28"/>
  <ellipse cx="64" cy="21" rx="3" ry="7" fill="#FFCA28" transform="rotate(20 64 21)"/>
</svg>
