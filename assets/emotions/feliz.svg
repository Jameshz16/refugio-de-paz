<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Pollito Feliz - Bajo tus Alas -->
  <!-- Sombra -->
  <ellipse cx="60" cy="108" rx="30" ry="6" fill="#E0C88A" opacity="0.3"/>
  <!-- Cuerpo -->
  <ellipse cx="60" cy="72" rx="32" ry="30" fill="#FFD54F"/>
  <!-- Ala izquierda -->
  <ellipse cx="30" cy="68" rx="14" ry="20" fill="#FFCA28" transform="rotate(-15 30 68)"/>
  <ellipse cx="30" cy="68" rx="10" ry="16" fill="#FFD54F" transform="rotate(-15 30 68)"/>
  <!-- Ala derecha -->
  <ellipse cx="90" cy="68" rx="14" ry="20" fill="#FFCA28" transform="rotate(15 90 68)"/>
  <ellipse cx="90" cy="68" rx="10" ry="16" fill="#FFD54F" transform="rotate(15 90 68)"/>
  <!-- Cabeza -->
  <circle cx="60" cy="42" r="24" fill="#FFD54F"/>
